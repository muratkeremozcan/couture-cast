# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
early_access: true
enable_free_tier: true

reviews:
  profile: chill
  high_level_summary: false
  high_level_summary_in_walkthrough: false
  request_changes_workflow: false
  review_status: false
  review_details: false
  commit_status: false
  collapse_walkthrough: true
  changed_files_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  poem: false
  in_progress_fortune: false
  suggested_labels: false
  suggested_reviewers: false
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    autofix:
      enabled: true
  pre_merge_checks:
    docstrings:
      mode: "off"
    title:
      mode: warning
      requirements: >-
        Use a conventional-commit prefix and name the user-visible feature,
        defect, or engineering outcome. Do not use only an epic, story, or task
        number.
    description:
      mode: warning
    issue_assessment:
      mode: "off"
  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
    base_branches:
      - main
  path_filters:
    # Whitelist-first: keep review context focused on actual repo surfaces.
    - ".coderabbit.yaml"
    - ".github/**"
    - ".husky/**"
    - "apps/**"
    - "packages/**"
    - "playwright/**"
    - "pact/**"
    - "k6/**"
    - "maestro/**"
    - "infra/**"
    - "scripts/**"
    - "supabase/**"
    - "docs/**"
    - "test-support/**"
    - "AGENTS.md"
    - "README.md"
    - "app.json"
    - "docker-compose.yml"
    - "package.json"
    - "playwright.config.ts"
    - "tsconfig.json"
    - "turbo.json"
    - ".env.example"
    - ".eslintignore"
    - ".eslintrc.js"
    - ".gitleaks.toml"
    - ".gitignore"
    - ".npmrc"
    - ".nvmrc"
    - ".prettierignore"
    - ".prettierrc"
    # Exclude generated, binary, and high-noise paths within the included surface.
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/coverage/**"
    - "!apps/web/.next/**"
    - "!playwright/artifacts/**"
    - "!playwright/playwright-logs/**"
    - "!playwright/playwright-report/**"
    - "!pact/artifacts/**"
    - "!maestro/artifacts/**"
    - "!blob-report/**"
    - "!playwright-logs/**"
    - "!_bmad-output/**"
    - "!pacts/**"
    - "!package-lock.json"
    - "!**/generated/**"
    - "!**/*.generated.*"
    - "!**/*.min.js"
    - "!**/*.woff"
    - "!**/*.woff2"
    - "!**/*.ttf"
    - "!**/*.ico"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.svg"
  path_instructions:
    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions workflow change. Review for branch/ref correctness, job
        dependencies, secret handling, permission scope, fork safety, and whether
        required-vs-advisory behavior still matches the repository policy.
        Flag brittle SHA assumptions, label-dependent control flow, and any step
        ordering that could make preview, burn-in, or deployment checks flaky.
    - path: ".github/actions/**"
      instructions: |
        Composite GitHub Action change. Review with the same rigor as workflow
        files: input/output correctness, shell safety, permission assumptions,
        secret handling, action portability, and whether downstream workflows can
        rely on the action's current contract without hidden regressions.
    - path: "scripts/**"
      instructions: |
        Automation script change. Check shell/Node portability, argument parsing,
        failure handling, exit codes, and whether the script still matches the CI,
        local developer workflow, and deployment assumptions used elsewhere in the
        repository.
    - path: "playwright/**"
      instructions: |
        Playwright test infrastructure change. Prioritize flake risk, deterministic
        waiting, fixture isolation, auth/session leakage between tests, and
        environment portability across local, preview, and production runs.
        Flag implicit cross-test dependencies, non-deterministic data setup, and
        assertions that are too timing-sensitive for CI.
    - path: "pact/**"
      instructions: |
        Pact contract-test change. Check consumer expectations against the
        published OpenAPI contract and provider behavior, provider-state setup and
        cleanup, matcher strictness, deterministic data, and isolation between
        interactions. Flag tests that can pass while masking a breaking contract
        change or that depend on generated pact files committed under `pacts/`.
    - path: "k6/**"
      instructions: |
        k6 performance-test change. Check executor and scenario semantics,
        thresholds, checks, environment safety, test-data isolation, request-rate
        assumptions, and summary/report compatibility with CI. Flag Node-only APIs,
        unbounded load, misleading success thresholds, and behavior that differs
        silently across local, preview, and production profiles.
    - path: "maestro/**"
      instructions: |
        Maestro/mobile E2E change. Focus on emulator/device determinism, analytics
        journey coverage, screenshot/log artifact usefulness, and whether the flow
        remains stable in manual or CI-triggered execution without hidden platform
        assumptions.
    - path: "apps/api/**"
      instructions: |
        API/backend change. Pay extra attention to auth/session boundaries,
        contract compatibility, request/response validation, error handling,
        health/observability behavior, and configuration loading. Flag changes
        that silently widen access, break existing API consumers, or reduce test
        diagnosability in CI.
    - path: "apps/web/**"
      instructions: |
        Next.js/web change. Review for server/client boundary mistakes, preview
        deployment assumptions, analytics capture correctness, hydration/runtime
        errors, accessibility regressions, and testability of user-visible flows.
    - path: "apps/mobile/**"
      instructions: |
        Expo/mobile change. Review for platform-specific behavior, analytics event
        integrity, offline/error handling, deterministic test support, and any
        config or dependency changes that could break local emulator workflows or
        CI/manual smoke execution.
    - path: "packages/**"
      instructions: |
        Shared package change. Check for downstream contract breakage across apps,
        type/schema compatibility, migration safety, feature-flag semantics, and
        whether shared helpers remain stable for both runtime code and tests.
    - path: "packages/db/prisma/migrations/**"
      instructions: |
        Database migration change. Treat data preservation and rollout safety as
        high risk. Check existing-row backfills, duplicate cleanup before unique
        constraints, lock and downtime risk, reversibility, RLS policy boundaries,
        deployment ordering, and compatibility with the current Prisma schema.
    - path: "packages/api-client/src/contracts/**"
      instructions: |
        API contract change. Check runtime validation, OpenAPI generation,
        backward compatibility, error responses, strictness, cardinality, and
        parity with controllers, services, Pact interactions, and generated
        clients. Flag contracts that accept invalid states or omit reachable
        responses.
    - path: "infra/**"
      instructions: |
        Infrastructure or observability change. Review for environment parity,
        safe defaults, credential handling, dashboard/query correctness, local
        bootstrap reliability, and whether the change impacts deployment or debug
        workflows outside the edited file itself.
    - path: "supabase/**"
      instructions: |
        Supabase/local platform config change. Check environment assumptions,
        migration compatibility, local bootstrap correctness, and whether the
        change can drift from Prisma, CI, or documented developer setup steps.
    - path: "docs/**"
      instructions: |
        Documentation change. Check internal consistency with the current repo,
        commands and paths that actually exist, and whether the change should also
        be reflected in `_bmad-output` or root README guidance.

chat:
  auto_reply: true

issue_enrichment:
  auto_enrich:
    enabled: false
