# Step 7 step 3 owner: searchable owner anchor
name: Burn-in changed Playwright specs

on:
  workflow_call:
    inputs:
      base-ref:
        type: string
        description: Base ref to diff against
        default: 'origin/main'
      test-directory:
        type: string
        description: Directory containing Playwright tests and burn-in script
        default: 'playwright/'
      install-command:
        type: string
        description: Dependency install command
        default: 'npm ci'
    outputs:
      runE2E:
        description: Whether downstream E2E should run
        value: ${{ jobs.burn-in.outputs.runE2E }}
    secrets:
      DATABASE_URL_DEV:
        required: false

jobs:
  burn-in:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      pull-requests: write
    env:
      LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    outputs:
      runE2E: ${{ steps.set-output.outputs.runE2E }}
      status: ${{ steps.set-output.outputs.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Resolve base ref
        id: base-ref
        run: |
          INPUT_BASE_REF="${{ inputs.base-ref }}"
          PR_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          EFFECTIVE_BASE_REF="$INPUT_BASE_REF"

          if [[ "${{ github.event_name }}" == "pull_request" && -n "$PR_BASE_SHA" ]]; then
            if [[ -z "$INPUT_BASE_REF" || "$INPUT_BASE_REF" == "origin/main" ]]; then
              EFFECTIVE_BASE_REF="$PR_BASE_SHA"
            fi
          fi

          echo "value=$EFFECTIVE_BASE_REF" >> "$GITHUB_OUTPUT"
          echo "Resolved base ref: $EFFECTIVE_BASE_REF"

      - name: Detect changed Playwright specs
        id: detect-changed
        run: |
          BASE_REF="${{ steps.base-ref.outputs.value }}"
          if [[ "$BASE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            # If the commit is already present locally, no fetch is required.
            git cat-file -e "${BASE_REF}^{commit}" 2>/dev/null || git fetch origin "$BASE_REF" --quiet || true
          else
            REMOTE_REF="$BASE_REF"
            LOCAL_REF="$BASE_REF"
            if [[ "$BASE_REF" =~ ^origin/ ]]; then
              REMOTE_REF="${BASE_REF#origin/}"
            fi
            git fetch origin "$REMOTE_REF" --quiet || true
            git branch -f "$LOCAL_REF" "origin/$REMOTE_REF" || true
          fi

          CHANGED=$(git diff "$BASE_REF"...HEAD --name-only | grep -E '^${{ inputs.test-directory }}.*\.(spec|test)\.(ts|tsx)$' || true)

          if [[ -z "$CHANGED" ]]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changed Playwright specs. Skipping burn-in.";
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changed specs:"; echo "$CHANGED"
          fi

      - name: Setup Node and install deps
        if: steps.detect-changed.outputs.changed == 'true'
        uses: ./.github/actions/install
        with:
          install-command: ${{ inputs.install-command }}
        
      - name: Setup Playwright browsers
        if: steps.detect-changed.outputs.changed == 'true'
        uses: ./.github/actions/setup-playwright-browsers

      - name: Start local Supabase services
        if: steps.detect-changed.outputs.changed == 'true'
        uses: ./.github/actions/start-local-supabase

      - name: Reset local burn-in database
        if: steps.detect-changed.outputs.changed == 'true'
        run: npm run db:reset
        env:
          DATABASE_URL: ${{ env.LOCAL_DATABASE_URL }}

      - name: Prepare base branch for diff
        if: steps.detect-changed.outputs.changed == 'true'
        run: |
          BASE_REF="${{ steps.base-ref.outputs.value }}"
          if [[ "$BASE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            git cat-file -e "${BASE_REF}^{commit}" 2>/dev/null || git fetch origin "$BASE_REF" --quiet || true
          else
            REMOTE_REF="$BASE_REF"
            LOCAL_REF="$BASE_REF"
            if [[ "$BASE_REF" =~ ^origin/ ]]; then
              REMOTE_REF="${BASE_REF#origin/}"
            fi
            git fetch origin "$REMOTE_REF" --quiet || true
            # Align local ref to remote to avoid ambiguous ref errors.
            git branch -f "$LOCAL_REF" "origin/$REMOTE_REF" || true
          fi

      - name: Record git SHA
        id: git-sha
        if: steps.detect-changed.outputs.changed == 'true'
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run burn-in for changed specs
        id: burn-in-step
        working-directory: ${{ inputs.test-directory }}
        if: steps.detect-changed.outputs.changed == 'true'
        run: |
          HUSKY=0 NEXT_DISABLE_ESLINT=1 NEXT_PRIVATE_SKIP_TYPE_CHECK=1 npm run build --workspace web
          npm run test:pw:burn-in-changed -- --base-branch=${{ steps.base-ref.outputs.value }}
        env:
          # Align health check SHA with the build produced in this workflow; use HEAD, not the PR merge ref
          EXPECTED_SHA: ${{ steps.git-sha.outputs.sha }}
          GITHUB_SHA: ${{ steps.git-sha.outputs.sha }}
          TEST_ENV: local
          DATABASE_URL: ${{ env.LOCAL_DATABASE_URL }}

      - name: Upload burn-in failure artifacts
        id: upload-burn-in-artifacts
        if: ${{ steps.detect-changed.outputs.changed == 'true' && steps.burn-in-step.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ${{ inputs.test-directory }}/playwright-report
            ${{ inputs.test-directory }}/test-results
          if-no-files-found: warn

      - name: Resolve burn-in artifact URL
        id: resolve-url
        if: ${{ github.event_name == 'pull_request' && steps.detect-changed.outputs.changed == 'true' && steps.burn-in-step.outcome == 'failure' && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = 'playwright-report';
            let reportUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            try {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              const artifact = data.artifacts.find((candidate) => candidate.name === artifactName);
              if (artifact?.id) {
                reportUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifact.id}`;
              }
            } catch (error) {
              core.warning(`Could not resolve burn-in report URL: ${error instanceof Error ? error.message : String(error)}`);
            }
            core.setOutput('report_url', reportUrl);

      - name: Comment burn-in result on PR
        if: ${{ github.event_name == 'pull_request' && steps.detect-changed.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- playwright-burn-in-report -->';
            const burnInOutcome = '${{ steps.burn-in-step.outcome }}';
            const reportUrl = '${{ steps.resolve-url.outputs.report_url }}';

            const body = burnInOutcome === 'failure'
              ? [
                  marker,
                  '## 🔥 Burn-in Failed',
                  '',
                  'The burn-in tests for changed specs failed. E2E is **blocked** until burn-in passes.',
                  '',
                  `📦 **[Download Burn-in Report & Traces](${reportUrl})**`,
                  '',
                  '_Fix the failing tests and push again to re-run burn-in._',
                ].join('\n')
              : [
                  marker,
                  '## ✅ Burn-in Passed',
                  '',
                  'The burn-in tests for changed specs passed. E2E will proceed.',
                ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing burn-in comment (id: ${existing.id})`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created new burn-in comment');
            }

      - name: Set downstream gating output
        id: set-output
        if: always()
        run: |
          if [[ "${{ steps.detect-changed.outputs.changed }}" != "true" ]]; then
            echo "runE2E=true" >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "✅ Burn-in skipped (no changed specs)";
            exit 0
          fi

          RUN_E2E="true"
          if [[ "${{ steps.burn-in-step.outcome }}" != "success" ]]; then
            RUN_E2E="false"
          fi

          echo "runE2E=${RUN_E2E}" >> "$GITHUB_OUTPUT"
          echo "status=${{ steps.burn-in-step.outcome }}" >> "$GITHUB_OUTPUT"

          if [[ "$RUN_E2E" == "true" ]]; then
            echo "✅ Burn-in gate passed"
          else
            echo "❌ Burn-in gate blocked"
          fi
