name: Burn-in changed Playwright specs

on:
  workflow_call:
    inputs:
      base-ref:
        type: string
        description: Base ref to diff against
        default: 'origin/main'
      test-directory:
        type: string
        description: Directory containing Playwright tests and burn-in script
        default: 'playwright/'
      install-command:
        type: string
        description: Dependency install command
        default: 'npm ci'
    outputs:
      runE2E:
        description: Whether downstream E2E should run
        value: ${{ jobs.burn-in.outputs.runE2E }}
    secrets:
      DATABASE_URL_DEV:
        required: false

jobs:
  burn-in:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      runE2E: ${{ steps.set-output.outputs.runE2E }}
      status: ${{ steps.set-output.outputs.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Resolve base ref
        id: base-ref
        run: |
          INPUT_BASE_REF="${{ inputs.base-ref }}"
          PR_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          EFFECTIVE_BASE_REF="$INPUT_BASE_REF"

          if [[ "${{ github.event_name }}" == "pull_request" && -n "$PR_BASE_SHA" ]]; then
            if [[ -z "$INPUT_BASE_REF" || "$INPUT_BASE_REF" == "origin/main" ]]; then
              EFFECTIVE_BASE_REF="$PR_BASE_SHA"
            fi
          fi

          echo "value=$EFFECTIVE_BASE_REF" >> "$GITHUB_OUTPUT"
          echo "Resolved base ref: $EFFECTIVE_BASE_REF"

      - name: Detect changed Playwright specs
        id: detect-changed
        run: |
          BASE_REF="${{ steps.base-ref.outputs.value }}"
          if [[ "$BASE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            # If the commit is already present locally, no fetch is required.
            git cat-file -e "${BASE_REF}^{commit}" 2>/dev/null || git fetch origin "$BASE_REF" --quiet || true
          else
            REMOTE_REF="$BASE_REF"
            LOCAL_REF="$BASE_REF"
            if [[ "$BASE_REF" =~ ^origin/ ]]; then
              REMOTE_REF="${BASE_REF#origin/}"
            fi
            git fetch origin "$REMOTE_REF" --quiet || true
            git branch -f "$LOCAL_REF" "origin/$REMOTE_REF" || true
          fi

          CHANGED=$(git diff "$BASE_REF"...HEAD --name-only | grep -E '^${{ inputs.test-directory }}.*\.(spec|test)\.(ts|tsx)$' || true)

          if [[ -z "$CHANGED" ]]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changed Playwright specs. Skipping burn-in.";
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changed specs:"; echo "$CHANGED"
          fi

      - name: Setup Node and install deps
        if: steps.detect-changed.outputs.changed == 'true'
        uses: ./.github/actions/install
        with:
          install-command: ${{ inputs.install-command }}
        
      - name: Setup Playwright browsers
        if: steps.detect-changed.outputs.changed == 'true'
        uses: ./.github/actions/setup-playwright-browsers

      - name: Prepare base branch for diff
        if: steps.detect-changed.outputs.changed == 'true'
        run: |
          BASE_REF="${{ steps.base-ref.outputs.value }}"
          if [[ "$BASE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            git cat-file -e "${BASE_REF}^{commit}" 2>/dev/null || git fetch origin "$BASE_REF" --quiet || true
          else
            REMOTE_REF="$BASE_REF"
            LOCAL_REF="$BASE_REF"
            if [[ "$BASE_REF" =~ ^origin/ ]]; then
              REMOTE_REF="${BASE_REF#origin/}"
            fi
            git fetch origin "$REMOTE_REF" --quiet || true
            # Align local ref to remote to avoid ambiguous ref errors.
            git branch -f "$LOCAL_REF" "origin/$REMOTE_REF" || true
          fi

      - name: Record git SHA
        id: git-sha
        if: steps.detect-changed.outputs.changed == 'true'
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run burn-in for changed specs
        id: burn-in-step
        working-directory: ${{ inputs.test-directory }}
        if: steps.detect-changed.outputs.changed == 'true'
        run: |
          HUSKY=0 NEXT_DISABLE_ESLINT=1 NEXT_PRIVATE_SKIP_TYPE_CHECK=1 npm run build --workspace web
          npm run test:pw:burn-in-changed -- --base-branch=${{ steps.base-ref.outputs.value }}
        env:
          # Align health check SHA with the build produced in this workflow; use HEAD, not the PR merge ref
          EXPECTED_SHA: ${{ steps.git-sha.outputs.sha }}
          GITHUB_SHA: ${{ steps.git-sha.outputs.sha }}
          TEST_ENV: local
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}

      - name: Upload burn-in failure artifacts
        id: upload-burn-in-artifacts
        if: ${{ steps.detect-changed.outputs.changed == 'true' && steps.burn-in-step.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ inputs.test-directory }}/playwright-report
            ${{ inputs.test-directory }}/test-results
          if-no-files-found: warn

      - name: Resolve burn-in artifact URL
        id: resolve-burn-in-artifact-url
        if: ${{ steps.detect-changed.outputs.changed == 'true' && steps.burn-in-step.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const artifactName = 'burn-in-report-${{ github.run_id }}-${{ github.run_attempt }}';
            const { owner, repo } = context.repo;
            const runId = context.runId;

            let artifact;
            for (let attempt = 1; attempt <= 5; attempt += 1) {
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner,
                repo,
                run_id: runId,
                per_page: 100,
              });
              artifact = artifacts.find((item) => item.name === artifactName && !item.expired);
              if (artifact) break;
              await new Promise((resolve) => setTimeout(resolve, 2000));
            }

            const reportUrl = artifact
              ? `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`
              : '';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            core.setOutput('report-url', reportUrl);
            core.setOutput('run-url', runUrl);

      - name: Set downstream gating output
        id: set-output
        if: always()
        run: |
          if [[ "${{ steps.detect-changed.outputs.changed }}" != "true" ]]; then
            echo "runE2E=true" >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "✅ Burn-in skipped (no changed specs)";
            exit 0
          fi

          RUN_E2E="true"
          if [[ "${{ steps.burn-in-step.outcome }}" != "success" ]]; then
            RUN_E2E="false"
          fi

          echo "runE2E=${RUN_E2E}" >> "$GITHUB_OUTPUT"
          echo "status=${{ steps.burn-in-step.outcome }}" >> "$GITHUB_OUTPUT"

          if [[ "$RUN_E2E" == "true" ]]; then
            echo "✅ Burn-in gate passed"
          else
            echo "❌ Burn-in gate blocked"
          fi

      - name: Build burn-in PR comment body
        id: burn-in-comment-body
        if: ${{ always() && github.event_name == 'pull_request' }}
        shell: bash
        env:
          CHANGED: ${{ steps.detect-changed.outputs.changed }}
          BURN_IN_OUTCOME: ${{ steps.burn-in-step.outcome || 'skipped' }}
          UPLOADED_ARTIFACT_ID: ${{ steps.upload-burn-in-artifacts.outputs.artifact-id }}
          RESOLVED_REPORT_URL: ${{ steps.resolve-burn-in-artifact-url.outputs.report-url }}
          RESOLVED_RUN_URL: ${{ steps.resolve-burn-in-artifact-url.outputs.run-url }}
        run: |
          RUN_URL="${RESOLVED_RUN_URL}"
          if [[ -z "$RUN_URL" ]]; then
            RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi

          ARTIFACT_URL=""
          if [[ -n "${UPLOADED_ARTIFACT_ID}" ]]; then
            ARTIFACT_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${UPLOADED_ARTIFACT_ID}"
          elif [[ -n "${RESOLVED_REPORT_URL}" ]]; then
            ARTIFACT_URL="${RESOLVED_REPORT_URL}"
          fi

          {
            echo "body<<EOF"
            echo "<!-- burn-in-gate-status -->"

            if [[ "${CHANGED}" != "true" ]]; then
              echo "ℹ️ Burn-in skipped (no changed Playwright specs)."
              echo "- Run: ${RUN_URL}"
            elif [[ "${BURN_IN_OUTCOME}" == "success" ]]; then
              echo "✅ Burn-in passed for changed Playwright specs."
              echo "- Run: ${RUN_URL}"
            else
              echo "🚨 Burn-in failed for changed Playwright specs."
              echo "Downstream E2E is blocked until burn-in is green."
              if [[ -n "${ARTIFACT_URL}" ]]; then
                echo "- Burn-in report + traces: ${ARTIFACT_URL}"
              else
                echo "- Burn-in run: ${RUN_URL}"
              fi
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing burn-in PR comment
        id: find-burn-in-comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '<!-- burn-in-gate-status -->'
          comment-author: 'github-actions[bot]'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upsert burn-in PR comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-burn-in-comment.outputs.comment-id }}
          body: ${{ steps.burn-in-comment-body.outputs.body }}
          edit-mode: replace
          token: ${{ secrets.GITHUB_TOKEN }}
