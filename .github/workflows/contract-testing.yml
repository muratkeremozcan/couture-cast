name: Contract testing

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  local-contracts:
    name: Local schema and Pact contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          use-npm-ci: 'false'

      - name: Run blocking Pact workflow
        id: pact
        continue-on-error: true
        run: npm run test:pact

      - name: Pact report and comment
        if: always()
        uses: ./.github/actions/pact-report-comment
        with:
          report-name: contract-testing-diagnostics-${{ github.event.pull_request.number || github.sha }}
          test-outcome: ${{ steps.pact.outcome }}
          check-label: 'Local schema, consumer, and provider contracts'

      - name: Fail if Pact workflow failed
        if: steps.pact.outcome == 'failure'
        run: exit 1
