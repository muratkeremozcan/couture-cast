name: Contract testing

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  local-contracts:
    name: Local schema and Pact contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          use-npm-ci: 'false'

      - name: Run blocking Pact workflow
        id: pact
        run: npm run test:pact

      - name: Upload contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-testing-diagnostics-${{ github.event.pull_request.number || github.sha }}
          path: |
            packages/api-client/docs/http.openapi.json
            pacts/
            pact/artifacts/
          if-no-files-found: ignore
          retention-days: 14

      - name: Summarize contract status
        if: always()
        run: |
          {
            echo "## Contract testing"
            echo ""
            echo "| Check | Outcome |"
            echo "| --- | --- |"
            echo "| Local schema, consumer, and provider contracts | ${{ steps.pact.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
