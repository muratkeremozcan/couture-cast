name: k6 smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/api/**'
      - 'k6/**'
      - 'packages/k6-utils/**'
      - 'packages/api-client/src/contracts/http/**'
      - 'packages/db/prisma/**'
      - 'package*.json'
      - '.github/workflows/k6-smoke-prs.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  k6-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      TEST_ENV: local
      ALLOW_DEV_GUARDIAN_SECRET: 'true'
      GUARDIAN_INVITE_WEB_BASE_URL: http://127.0.0.1:3005
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node environment
        uses: ./.github/actions/install

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Start local Supabase services
        uses: ./.github/actions/start-local-supabase

      - name: Reset local database
        run: npm run db:reset

      - name: Run k6 PR smoke
        id: k6
        continue-on-error: true
        env:
          CI: 'true'
          GIT_SHA: ${{ github.sha }}
          K6_RUN_MODE: smoke
          SUMMARY_OUTPUT: k6/summary.json
        run: npm run test:k6:local

      - name: k6 report and comment
        if: always()
        uses: ./.github/actions/k6-report-comment
        with:
          summary-glob: k6/summary-*.json
          report-name: k6-smoke-${{ github.event.pull_request.number || github.sha }}
          test-outcome: ${{ steps.k6.outcome }}
          run-mode: smoke

      - name: Fail if k6 smoke failed
        if: steps.k6.outcome == 'failure'
        run: exit 1
