# Step 7 step 1 owner: searchable owner anchor
name: PR checks
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
  COVERAGE_GIST_ID: 64348ebdc6e662b93ade9f40bdc03442

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          use-npm-ci: 'false'

      - name: Verify web aliased runtime dependencies
        run: npm run check:web:aliased-runtime-deps

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Lint sources
        run: npm run lint

      - name: Build packages
        run: npm run build

      - name: Run tests with coverage
        id: tests
        continue-on-error: true
        run: npm run test:coverage

      - name: Coverage report and PR comment
        uses: ./.github/actions/unit-test-coverage-comment
        with:
          coverage-path: ./coverage
          coverage-summary-path: ./coverage/coverage-summary.json
          report-name: coverage-report-${{ github.event.pull_request.number || github.sha }}
          test-outcome: ${{ steps.tests.outcome }}
          workspace-dirs: '["apps/api/coverage","apps/web/coverage","apps/mobile/coverage","packages/api-client/coverage","packages/config/coverage"]'
          badge-gist-id: ${{ env.COVERAGE_GIST_ID }}
          badge-filename-prefix: couture-cast
          badge-gist-auth: ${{ secrets.COVERAGE_GIST_TOKEN }}

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
