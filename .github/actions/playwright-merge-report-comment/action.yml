name: Playwright merge report and comment

# IMPORTANT: Check out the repo before using this step in your workflow
description: 'Merge Playwright shard reports and optionally comment on PR'

inputs:
  blob-pattern:
    description: 'Artifact name pattern for blob reports'
    required: false
    default: 'blob-report-*'
  blob-path:
    description: 'Path to download blob reports'
    required: false
    default: 'all-blob-reports'
  report-name:
    description: 'Name for merged report artifact'
    required: false
    default: 'playwright-report'
  report-path:
    description: 'Path for merged report output'
    required: false
    default: 'playwright-report'
  retention-days:
    description: 'Artifact retention days'
    required: false
    default: '5'
  burn-in-result:
    description: 'Burn-in result string for summary/comment'
    required: false
    default: 'skipped'
  environment:
    description: 'Execution environment label for summary/comment'
    required: false
    default: 'local'
  e2e-result:
    description: 'E2E result string for summary/comment'
    required: false
    default: 'unknown'
  shards:
    description: 'Shard count description for summary/comment'
    required: false
    default: '2'
  comment-on-pr:
    description: 'Whether to post a PR comment'
    required: false
    default: 'true'
  github-token:
    description: 'Token to use for GitHub API (pass GITHUB_TOKEN)'
    required: false
    default: ''
  deployment-url:
    description: 'Preview/production deployment URL to include in summary/comment'
    required: false
    default: ''

outputs:
  report-url:
    description: 'Download URL for merged report artifact'
    value: ${{ steps.resolve-url.outputs.report_url }}
  report-artifact-url:
    description: 'Direct artifact URL for merged report'
    value: ${{ steps.upload-report.outputs.artifact-url }}

runs:
  using: composite
  steps:

    - name: Download shard reports
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        path: ${{ inputs.blob-path }}
        pattern: ${{ inputs.blob-pattern }}
        merge-multiple: true

    - name: Detect downloaded blob reports
      id: detect-blobs
      shell: bash
      run: |
        if [ -d "${{ inputs.blob-path }}" ] && [ -n "$(find "${{ inputs.blob-path }}" -mindepth 1 -type f -print -quit 2>/dev/null)" ]; then
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Found Playwright blob artifacts."
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "No Playwright blob artifacts found."
        fi

    - name: Merge Playwright reports
      if: ${{ steps.detect-blobs.outputs.found == 'true' }}
      shell: bash
      run: |
        mkdir -p "${{ inputs.report-path }}/trace"
        cp -r "${{ inputs.blob-path }}"/*/trace/* "${{ inputs.report-path }}/trace" || true
        npx playwright merge-reports --reporter=html "${{ inputs.blob-path }}"

    - name: Upload merged report
      id: upload-report
      if: ${{ steps.detect-blobs.outputs.found == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.report-name }}
        path: ${{ inputs.report-path }}
        retention-days: ${{ inputs.retention-days }}

    - name: Resolve report download URL
      id: resolve-url
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const artifactName = '${{ inputs.report-name }}';
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const uploadedArtifactUrl = '${{ steps.upload-report.outputs.artifact-url }}';
          let reportUrl = uploadedArtifactUrl || runUrl;
          let hasReport = false;
          if (uploadedArtifactUrl) {
            hasReport = true;
          } else {
            try {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              const artifact = data.artifacts.find((a) => a.name === artifactName);
              if (artifact?.id) {
                hasReport = true;
                reportUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifact.id}`;
              }
            } catch (e) {
              core.warning(`Could not resolve report URL: ${e.message}`);
            }
          }
          core.setOutput('report_url', reportUrl);
          core.setOutput('run_url', runUrl);
          core.setOutput('has_report', String(hasReport));

    - name: Generate summary
      if: always()
      shell: bash
      env:
        BURN_IN: ${{ inputs.burn-in-result }}
        ENVIRONMENT: ${{ inputs.environment }}
        E2E_RESULT: ${{ inputs.e2e-result }}
        SHARDS: ${{ inputs.shards }}
        DEPLOY_URL: ${{ inputs.deployment-url }}
        HAS_REPORT: ${{ steps.resolve-url.outputs.has_report }}
        REPORT_URL: ${{ steps.resolve-url.outputs.report_url }}
        RUN_URL: ${{ steps.resolve-url.outputs.run_url }}
      run: |
        E2E_NORM="$(echo "${E2E_RESULT}" | tr '[:upper:]' '[:lower:]')"
        BURN_IN_NORM="$(echo "${BURN_IN}" | tr '[:upper:]' '[:lower:]')"
        if [ "${E2E_NORM}" = "success" ] && [ "${BURN_IN_NORM}" != "failure" ] && [ "${BURN_IN_NORM}" != "failed" ]; then
          STATUS="SUCCESS"
        else
          STATUS="FAILURE"
        fi

        case "${BURN_IN_NORM}" in
          success|passed) BURN_IN_DISPLAY="passed" ;;
          failure|failed) BURN_IN_DISPLAY="failed" ;;
          *) BURN_IN_DISPLAY="skipped" ;;
        esac

        echo "## Playwright E2E (${STATUS})" >> $GITHUB_STEP_SUMMARY
        echo "- Environment: ${ENVIRONMENT}" >> $GITHUB_STEP_SUMMARY
        echo "- Shards: ${SHARDS}" >> $GITHUB_STEP_SUMMARY
        echo "- Burn-in: ${BURN_IN_DISPLAY}" >> $GITHUB_STEP_SUMMARY
        if [ "${HAS_REPORT}" = "true" ]; then
          echo "- Report: [${{ inputs.report-name }}](${REPORT_URL})" >> $GITHUB_STEP_SUMMARY
        else
          echo "- Report: no Playwright blob artifacts found in this run" >> $GITHUB_STEP_SUMMARY
          echo "- Run: ${RUN_URL}" >> $GITHUB_STEP_SUMMARY
        fi
        if [ -n "${DEPLOY_URL}" ]; then
          echo "- Deployment: ${DEPLOY_URL}" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Build PR comment body
      id: pr-comment-body
      if: ${{ github.event_name == 'pull_request' && inputs.comment-on-pr == 'true' && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}
      shell: bash
      env:
        BURN_IN_RESULT: ${{ inputs.burn-in-result }}
        ENVIRONMENT: ${{ inputs.environment }}
        E2E_RESULT: ${{ inputs.e2e-result }}
        REPORT_URL: ${{ steps.resolve-url.outputs.report_url }}
        RUN_URL: ${{ steps.resolve-url.outputs.run_url }}
        HAS_REPORT: ${{ steps.resolve-url.outputs.has_report }}
      run: |
        E2E_NORM="$(echo "${E2E_RESULT}" | tr '[:upper:]' '[:lower:]')"
        BURN_IN_NORM="$(echo "${BURN_IN_RESULT}" | tr '[:upper:]' '[:lower:]')"
        if [ "${E2E_NORM}" = "success" ] && [ "${BURN_IN_NORM}" != "failure" ] && [ "${BURN_IN_NORM}" != "failed" ]; then
          STATUS_EMOJI="✅"
          STATUS_TEXT="SUCCESS"
        else
          STATUS_EMOJI="❌"
          STATUS_TEXT="FAILURE"
        fi

        case "${BURN_IN_NORM}" in
          success|passed) BURN_IN_DISPLAY="passed" ;;
          failure|failed) BURN_IN_DISPLAY="failed" ;;
          *) BURN_IN_DISPLAY="skipped" ;;
        esac

        if [ "${HAS_REPORT}" = "true" ]; then
          REPORT_LINK="${REPORT_URL}"
        else
          REPORT_LINK="${RUN_URL}"
        fi

        {
          echo "body<<EOF"
          echo "<!-- playwright-e2e-report -->"
          echo "## 🎭 Playwright E2E: ${STATUS_EMOJI} **${STATUS_TEXT}**"
          echo
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| Environment | ${ENVIRONMENT} |"
          echo "| Burn-in | ${BURN_IN_DISPLAY} |"
          echo
          echo "📦 **[Download Report & Traces](${REPORT_LINK})**"
          echo "_Includes HTML report and trace files for debugging failures_"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Cleanup legacy burn-in gate PR comment
      if: ${{ github.event_name == 'pull_request' && inputs.comment-on-pr == 'true' && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const marker = '<!-- burn-in-gate-status -->';
          const issueNumber = context.payload.pull_request.number;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            per_page: 100,
          });
          let deleted = 0;
          for (const comment of comments) {
            if (comment.body?.includes(marker)) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
              deleted += 1;
            }
          }
          core.info(`Deleted ${deleted} legacy burn-in comment(s).`);

    - name: Find existing Playwright PR comment
      id: find-pr-comment
      if: ${{ github.event_name == 'pull_request' && inputs.comment-on-pr == 'true' && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}
      uses: peter-evans/find-comment@v3
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-includes: '<!-- playwright-e2e-report -->'
        comment-author: 'github-actions[bot]'
        token: ${{ inputs.github-token || github.token }}

    - name: Upsert Playwright PR comment
      if: ${{ github.event_name == 'pull_request' && inputs.comment-on-pr == 'true' && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-id: ${{ steps.find-pr-comment.outputs.comment-id }}
        body: ${{ steps.pr-comment-body.outputs.body }}
        edit-mode: replace
        token: ${{ inputs.github-token || github.token }}
